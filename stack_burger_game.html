<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스택버거 온라인 보드게임 (Stack Burger)</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Jua & Nanum Gothic -->
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Nanum Gothic', sans-serif;
      overflow-x: hidden;
    }
    .font-jua {
      font-family: 'Jua', sans-serif;
    }
    /* Burger board checkered pattern background */
    .bg-grid-pattern {
      background-color: #fcf8f2;
      background-image: radial-gradient(#f3e8d5 1.5px, transparent 1.5px), radial-gradient(#f3e8d5 1.5px, #fcf8f2 1.5px);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
    }
    /* Card Flip animations */
    .flip-card {
      perspective: 1000px;
    }
    .flip-card-inner {
      transition: transform 0.4s;
      transform-style: preserve-3d;
    }
    .flip-card.flipped .flip-card-inner {
      transform: rotateY(180deg);
    }
    .flip-card-front, .flip-card-back {
      backface-visibility: hidden;
    }
    .flip-card-back {
      transform: rotateY(180deg);
    }
  </style>
</head>
<body class="bg-grid-pattern min-h-screen text-slate-800 p-1 md:p-2">
  <div id="root"></div>

  <!-- React & Babel CDNs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.10/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    class SoundEffects {
      constructor() {
        this.ctx = null;
        this.muted = false;
      }
      init() {
        if (!this.ctx) {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (this.ctx.state === 'suspended') {
          this.ctx.resume();
        }
      }
      playFlip() {
        if (this.muted) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.12);
        
        gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.12);
      }
      playSuccess() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        const playNote = (freq, delay, duration) => {
          const osc = this.ctx.createOscillator();
          const gain = this.ctx.createGain();
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + delay);
          gain.gain.setValueAtTime(0, now + delay);
          gain.gain.linearRampToValueAtTime(0.12, now + delay + 0.04);
          gain.gain.linearRampToValueAtTime(0, now + delay + duration);
          
          osc.start(now + delay);
          osc.stop(now + delay + duration);
        };
        
        playNote(261.63, 0, 0.12); // C4
        playNote(329.63, 0.06, 0.12); // E4
        playNote(392.00, 0.12, 0.12); // G4
        playNote(523.25, 0.18, 0.25); // C5
      }
      playFail() {
        if (this.muted) return;
        this.init();
        const now = this.ctx.currentTime;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(80, now + 0.3);
        
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
        
        osc.start();
        osc.stop(now + 0.3);
      }
      playSelect() {
        if (this.muted) return;
        this.init();
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(280, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(450, this.ctx.currentTime + 0.08);
        
        gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
        
        osc.start();
        osc.stop(this.ctx.currentTime + 0.08);
      }
    }

    const sfx = new SoundEffects();

    const INGREDIENTS_INFO = {
      bun: { name: '참깨빵', emoji: '🍞', color: 'from-amber-400 to-amber-600', borderColor: 'border-amber-700', text: 'text-amber-950' },
      patty: { name: '고기패티', emoji: '🥩', color: 'from-amber-800 to-amber-950', borderColor: 'border-amber-950', text: 'text-white' },
      tomato: { name: '토마토', emoji: '🍅', color: 'from-red-500 to-red-600', borderColor: 'border-red-700', text: 'text-white' },
      cheese: { name: '치즈', emoji: '🧀', color: 'from-yellow-300 to-yellow-500', borderColor: 'border-yellow-600', text: 'text-amber-950' },
      lettuce: { name: '양상추', emoji: '🥬', color: 'from-emerald-400 to-emerald-600', borderColor: 'border-emerald-700', text: 'text-white' },
      bacon: { name: '베이컨', emoji: '🥓', color: 'from-rose-500 to-rose-700', borderColor: 'border-rose-950', text: 'text-white' }
    };

    const RECIPES_POOL = [
      { id: 'r1', name: '치즈버거 샌드', points: 1, ingredients: ['bun', 'cheese', 'bun'] },
      { id: 'r2', name: '오리지널 패티버거', points: 1, ingredients: ['bun', 'patty', 'bun'] },
      { id: 'r3', name: '양상추 프레시버거', points: 1, ingredients: ['bun', 'lettuce', 'bun'] },
      { id: 'r4', name: '토마토 토스트', points: 1, ingredients: ['bun', 'tomato', 'bun'] },
      { id: 'r5', name: '클래식 버거', points: 2, ingredients: ['bun', 'patty', 'cheese', 'bun'] },
      { id: 'r6', name: '베이컨 홀릭', points: 2, ingredients: ['bun', 'bacon', 'cheese', 'bun'] },
      { id: 'r7', name: '더블 치즈 클래식', points: 2, ingredients: ['bun', 'cheese', 'cheese', 'bun'] },
      { id: 'r8', name: '토마토 가든', points: 2, ingredients: ['bun', 'lettuce', 'tomato', 'bun'] },
      { id: 'r9', name: '고기 가득 패티버거', points: 2, ingredients: ['bun', 'patty', 'patty', 'bun'] },
      { id: 'r10', name: '베이컨 프레시 버거', points: 3, ingredients: ['bun', 'bacon', 'lettuce', 'tomato', 'bun'] },
      { id: 'r11', name: '굿모닝 메가버거', points: 3, ingredients: ['bun', 'patty', 'cheese', 'tomato', 'bun'] },
      { id: 'r12', name: '자이언트 더블패티', points: 3, ingredients: ['bun', 'patty', 'cheese', 'patty', 'bun'] },
      { id: 'r13', name: '마스터 킹버거', points: 3, ingredients: ['bun', 'patty', 'bacon', 'cheese', 'lettuce', 'bun'] },
      { id: 'r14', name: '에코 그린스페셜', points: 3, ingredients: ['bun', 'lettuce', 'cheese', 'tomato', 'lettuce', 'bun'] }
    ];

    function App() {
      const [gamePhase, setGamePhase] = useState('setup'); // 'setup', 'playing', 'gameover'
      const [gridSize, setGridSize] = useState(16); // 16 (4x4), 20 (4x5), 24 (4x6)
      const [winningScore, setWinningScore] = useState(7);
      const [recipeFilter, setRecipeFilter] = useState('all'); // 'all'(모두), 'short'(3단 단일), 'medium'(4단), 'long'(5단 이상)
      
      const [players, setPlayers] = useState([
        { id: 1, name: '학생 1', score: 0, color: 'bg-red-500 border-red-600', textColor: 'text-red-500', icon: '🦖' },
        { id: 2, name: '학생 2', score: 0, color: 'bg-blue-500 border-blue-600', textColor: 'text-blue-500', icon: '🐳' },
        { id: 3, name: '학생 3', score: 0, color: 'bg-emerald-500 border-emerald-600', textColor: 'text-emerald-500', icon: '🦊' },
        { id: 4, name: '학생 4', score: 0, color: 'bg-amber-500 border-amber-600', textColor: 'text-amber-500', icon: '🐼' },
        { id: 5, name: '학생 5', score: 0, color: 'bg-purple-500 border-purple-600', textColor: 'text-purple-500', icon: '🦄' }
      ]);
      const [currentPlayerIndex, setCurrentPlayerIndex] = useState(0);

      const addPlayer = () => {
        if (players.length >= 8) {
          showAlert('최대 8명까지만 등록할 수 있습니다!', 'error');
          return;
        }
        const presets = [
          { icon: '🦁', name: `학생 ${players.length + 1}`, color: 'bg-orange-500 border-orange-600' },
          { icon: '🐹', name: `학생 ${players.length + 1}`, color: 'bg-pink-500 border-pink-600' },
          { icon: '🐱', name: `학생 ${players.length + 1}`, color: 'bg-indigo-500 border-indigo-600' },
          { icon: '🐸', name: `학생 ${players.length + 1}`, color: 'bg-emerald-500 border-emerald-600' },
        ];
        const preset = presets[(players.length - 5) % presets.length] || presets[0];
        const newId = Math.max(...players.map(p => p.id), 0) + 1;

        setPlayers([
          ...players,
          {
            id: newId,
            name: preset.name,
            score: 0,
            color: preset.color,
            textColor: preset.color.replace('bg-', 'text-'),
            icon: preset.icon
          }
        ]);
        sfx.playSelect();
        addLog(`➕ 새 학생이 수업에 참여했습니다.`);
      };

      const deletePlayer = (id) => {
        if (players.length <= 2) {
          showAlert('최소 2명의 플레이어가 필요합니다.', 'error');
          return;
        }
        setPlayers(players.filter(p => p.id !== id));
        sfx.playSelect();
        addLog(`➖ 학생 한 명이 대기열에서 나갔습니다.`);
      };

      const [tiles, setTiles] = useState([]);
      const [activeRecipes, setActiveRecipes] = useState([]);
      const [recipePool, setRecipePool] = useState([]);
      const [currentAction, setCurrentAction] = useState('explore'); // 'explore' or 'challenge'
      
      const [exploredTileIds, setExploredTileIds] = useState([]);
      const [challengeTargetRecipe, setChallengeTargetRecipe] = useState(null);
      const [challengeStep, setChallengeStep] = useState(0);
      const [challengeFlippedTileIds, setChallengeFlippedTileIds] = useState([]);
      
      const [gameLog, setGameLog] = useState([]);
      const [alertMsg, setAlertMsg] = useState({ text: '', type: 'info' });
      const [showRules, setShowRules] = useState(false);
      const [isMuted, setIsMuted] = useState(false);
      const [timeLeft, setTimeLeft] = useState(45);
      const [isTimerActive, setIsTimerActive] = useState(false);
      const timerRef = useRef(null);

      const toggleMute = () => {
        sfx.muted = !isMuted;
        setIsMuted(!isMuted);
      };

      const addLog = (message) => {
        setGameLog(prev => [message, ...prev.slice(0, 19)]);
      };

      const showAlert = (text, type = 'info', duration = 2500) => {
        setAlertMsg({ text, type });
        if (duration > 0) {
          setTimeout(() => {
            setAlertMsg(prev => prev.text === text ? { text: '', type: 'info' } : prev);
          }, duration);
        }
      };

      const startGame = () => {
        // Base grid setup
        let baseIngredients = [];
        if (gridSize === 16) {
          baseIngredients = [
            'bun', 'bun', 'bun', 'bun',
            'patty', 'patty', 'patty',
            'tomato', 'tomato', 'tomato',
            'cheese', 'cheese', 'cheese',
            'lettuce', 'lettuce', 'lettuce'
          ];
        } else if (gridSize === 20) {
          baseIngredients = [
            'bun', 'bun', 'bun', 'bun', 'bun',
            'patty', 'patty', 'patty',
            'tomato', 'tomato', 'tomato',
            'cheese', 'cheese', 'cheese',
            'lettuce', 'lettuce', 'lettuce',
            'bacon', 'bacon', 'bacon'
          ];
        } else {
          baseIngredients = [
            'bun', 'bun', 'bun', 'bun', 'bun', 'bun',
            'patty', 'patty', 'patty', 'patty',
            'tomato', 'tomato', 'tomato', 'tomato',
            'cheese', 'cheese', 'cheese', 'cheese',
            'lettuce', 'lettuce', 'lettuce', 'lettuce',
            'bacon', 'bacon', 'bacon'
          ];
        }

        const shuffle = (array) => {
          const arr = [...array];
          for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
          }
          return arr;
        };

        const shuffledTypes = shuffle(baseIngredients);
        const newTiles = shuffledTypes.map((type, index) => ({
          id: index,
          type,
          isFlipped: false,
          isMatched: false
        }));

        setTiles(newTiles);

        // Filter and prepare recipes based on choice
        let selectedRecipes = [...RECIPES_POOL];
        if (recipeFilter === 'short') {
          selectedRecipes = RECIPES_POOL.filter(r => r.ingredients.length === 3);
        } else if (recipeFilter === 'medium') {
          selectedRecipes = RECIPES_POOL.filter(r => r.ingredients.length === 4);
        } else if (recipeFilter === 'long') {
          selectedRecipes = RECIPES_POOL.filter(r => r.ingredients.length >= 5);
        }

        const shuffledRecipes = shuffle(selectedRecipes);
        
        // Safety check if list is too small (recycle list)
        let finalPool = [...shuffledRecipes];
        while (finalPool.length < 5) {
          finalPool = [...finalPool, ...shuffle(selectedRecipes)];
        }

        const initialActive = finalPool.slice(0, 3);
        const pool = finalPool.slice(3);

        setActiveRecipes(initialActive);
        setRecipePool(pool);

        // Reset game status
        setPlayers(prev => prev.map(p => ({ ...p, score: 0 })));
        setCurrentPlayerIndex(0);
        setCurrentAction('explore');
        setExploredTileIds([]);
        setChallengeTargetRecipe(null);
        setChallengeStep(0);
        setChallengeFlippedTileIds([]);

        setGamePhase('playing');
        setGameLog([]);
        addLog('🎮 게임이 시작되었습니다! 맛있는 버거를 조리해 봅시다.');
        showAlert(`${players[0].name}님의 턴! 타일을 탐색하거나 레시피에 도전하세요.`, 'info');

        setTimeLeft(45);
        setIsTimerActive(true);
      };

      useEffect(() => {
        if (isTimerActive && timeLeft > 0 && gamePhase === 'playing') {
          timerRef.current = setTimeout(() => {
            setTimeLeft(prev => prev - 1);
          }, 1000);
        } else if (timeLeft === 0 && gamePhase === 'playing') {
          showAlert(`시간이 초과되었습니다! 다음 순서로 넘어갑니다.`, 'error');
          sfx.playFail();
          nextTurn();
        }
        return () => clearTimeout(timerRef.current);
      }, [timeLeft, isTimerActive, gamePhase]);

      const nextTurn = () => {
        setExploredTileIds([]);
        setChallengeTargetRecipe(null);
        setChallengeStep(0);
        setChallengeFlippedTileIds([]);
        setCurrentAction('explore');

        setTiles(prev => prev.map(t => ({ ...t, isFlipped: false })));

        setCurrentPlayerIndex(prev => {
          const nextIdx = (prev + 1) % players.length;
          showAlert(`${players[nextIdx].name}님의 차례입니다!`, 'info');
          return nextIdx;
        });

        setTimeLeft(45);
      };

      const handleNameChange = (id, newName) => {
        setPlayers(prev => prev.map(p => p.id === id ? { ...p, name: newName } : p));
      };

      const handleIconChange = (id, icon) => {
        setPlayers(prev => prev.map(p => p.id === id ? { ...p, icon } : p));
      };

      const handleExploreTile = (tileId) => {
        if (currentAction !== 'explore') return;
        const targetTile = tiles.find(t => t.id === tileId);
        if (targetTile.isFlipped) return;

        if (exploredTileIds.length >= 2) {
          showAlert('한 번에 최대 2개의 타일까지만 탐색할 수 있습니다.', 'info');
          return;
        }

        sfx.playFlip();

        setTiles(prev => prev.map(t => t.id === tileId ? { ...t, isFlipped: true } : t));
        const updatedExplored = [...exploredTileIds, tileId];
        setExploredTileIds(updatedExplored);

        const ingredientName = INGREDIENTS_INFO[targetTile.type].name;
        addLog(`🔍 ${players[currentPlayerIndex].name}님이 [${ingredientName}] 위치를 확인했습니다.`);

        if (updatedExplored.length === 2) {
          showAlert('2개 타일 탐색 완료! 확인 후 "탐색 차례 마치기"를 누르세요.', 'success');
        }
      };

      const handleEndExplore = () => {
        sfx.playSelect();
        nextTurn();
      };

      const startChallenge = (recipe) => {
        if (currentAction === 'challenge') return;
        sfx.playSelect();

        setTiles(prev => prev.map(t => ({ ...t, isFlipped: false })));
        setExploredTileIds([]);

        setCurrentAction('challenge');
        setChallengeTargetRecipe(recipe);
        setChallengeStep(0);
        setChallengeFlippedTileIds([]);

        addLog(`🔥 ${players[currentPlayerIndex].name}님이 [${recipe.name}] 만들기에 돌입했습니다!`);
        showAlert(`첫 번째 재료인 '${INGREDIENTS_INFO[recipe.ingredients[0]].name}' 타일을 뒤집으세요!`, 'info', 3000);
      };

      const handleChallengeTile = (tileId) => {
        if (currentAction !== 'challenge' || !challengeTargetRecipe) return;

        const clickedTile = tiles.find(t => t.id === tileId);
        if (clickedTile.isFlipped) return;

        sfx.playFlip();

        const neededType = challengeTargetRecipe.ingredients[challengeStep];
        const isCorrect = clickedTile.type === neededType;

        setTiles(prev => prev.map(t => t.id === tileId ? { ...t, isFlipped: true } : t));

        if (isCorrect) {
          const nextStep = challengeStep + 1;
          const updatedFlippedIds = [...challengeFlippedTileIds, tileId];
          setChallengeFlippedTileIds(updatedFlippedIds);
          setChallengeStep(nextStep);

          const matchedName = INGREDIENTS_INFO[clickedTile.type].name;
          addLog(`✅ 알맞은 재료! '${matchedName}'를 트레이에 얹었습니다.`);

          if (nextStep === challengeTargetRecipe.ingredients.length) {
            sfx.playSuccess();
            addLog(`🎉 성공! ${players[currentPlayerIndex].name}님이 [${challengeTargetRecipe.name}] 버거를 완성하고 🧑‍🍳 모자 ${challengeTargetRecipe.points}개를 얻었습니다!`);
            showAlert(`[성공 🎉] 버거를 완벽히 만들었습니다! (+${challengeTargetRecipe.points}점)`, 'success', 3000);

            setPlayers(prev => prev.map((p, idx) => {
              if (idx === currentPlayerIndex) {
                const newScore = p.score + challengeTargetRecipe.points;
                if (newScore >= winningScore) {
                  setTimeout(() => {
                    setGamePhase('gameover');
                    sfx.playSuccess();
                  }, 1200);
                }
                return { ...p, score: newScore };
              }
              return p;
            }));

            setTimeout(() => {
              replaceCompletedRecipe(challengeTargetRecipe.id);
              nextTurn();
            }, 1800);

          } else {
            const nextNeededName = INGREDIENTS_INFO[challengeTargetRecipe.ingredients[nextStep]].name;
            showAlert(`정확합니다! 다음 재료: '${nextNeededName}'를 뒤집으세요.`, 'success');
          }

        } else {
          sfx.playFail();
          const wrongName = INGREDIENTS_INFO[clickedTile.type].name;
          const expectedName = INGREDIENTS_INFO[neededType].name;
          
          addLog(`💥 조리 실패! '${expectedName}' 대신 잘못된 재료 '${wrongName}'를 찾았습니다.`);
          showAlert(`[도전 실패 💥] '${expectedName}'가 필요하지만 '${wrongName}'였습니다!`, 'error', 2000);

          setTimeout(() => {
            nextTurn();
          }, 2000);
        }
      };

      const replaceCompletedRecipe = (completedId) => {
        let nextRecipe = null;
        let newPool = [...recipePool];
        let baseFilterPool = [...RECIPES_POOL];

        if (recipeFilter === 'short') {
          baseFilterPool = RECIPES_POOL.filter(r => r.ingredients.length === 3);
        } else if (recipeFilter === 'medium') {
          baseFilterPool = RECIPES_POOL.filter(r => r.ingredients.length === 4);
        } else if (recipeFilter === 'long') {
          baseFilterPool = RECIPES_POOL.filter(r => r.ingredients.length >= 5);
        }

        if (newPool.length > 0) {
          nextRecipe = newPool[0];
          newPool = newPool.slice(1);
        } else {
          const recycled = [...baseFilterPool].sort(() => Math.random() - 0.5);
          nextRecipe = recycled[0];
          newPool = recycled.slice(1);
        }

        setActiveRecipes(prev => prev.map(r => r.id === completedId ? nextRecipe : r));
        setRecipePool(newPool);
      };

      const forceReshuffleField = () => {
        sfx.playSelect();
        const existingTypes = tiles.map(t => t.type);
        const shuffled = existingTypes.sort(() => Math.random() - 0.5);
        setTiles(shuffled.map((type, idx) => ({
          id: idx,
          type,
          isFlipped: false,

                    <span className="text-xl">{activePlayer.icon}</span>

                      <div className="text-sm font-jua text-white">{activePlayer.name}</div>

                  </div>
                )}

                {/* MAIN GRID: THE KITCHEN PANTRY TILES (COMPACT RATIO FOR PADLET VIEWS) */}
                <div className="bg-amber-950/5 border-2 border-amber-800 p-2 rounded-xl relative shadow-inner">
                  <div className={`grid ${getGridColsClass()} gap-1.5 md:gap-2`}>
                    {tiles.map((tile) => {
                      const ingInfo = INGREDIENTS_INFO[tile.type];
                      const showFront = tile.isFlipped;

                      const handleTileClick = () => {
                        if (currentAction === 'explore') {
                          handleExploreTile(tile.id);
                        } else if (currentAction === 'challenge') {
                          handleChallengeTile(tile.id);
                        }
                      };

                      return (
                        <div
                          key={tile.id}
                          onClick={handleTileClick}
                          className={`flip-card h-14 sm:h-16 rounded-xl cursor-pointer ${showFront ? 'flipped' : ''}`}
                        >
                          <div className="flip-card-inner relative w-full h-full duration-300">
                            
                            {/* CARD BACK */}
                            {}
                            <div className="flip-card-front absolute w-full h-full bg-gradient-to-br from-amber-700 to-amber-900 border border-amber-950 rounded-xl shadow flex flex-col items-center justify-center p-1 text-white hover:brightness-105 active:scale-95">
                              <span className="text-xl font-jua text-amber-200">{tile.id + 1}</span>
                              <span className="text-[7px] font-bold text-amber-400/80">🍳 TOUCH</span>
                            </div>

                            {/* CARD FRONT */}
                            <div className={`flip-card-back absolute w-full h-full bg-gradient-to-br ${ingInfo.color} border-2 ${ingInfo.borderColor} rounded-xl shadow-inner flex flex-col items-center justify-center p-0.5 text-white`}>
                              <span className="text-lg md:text-2xl">{ingInfo.emoji}</span>
                              <span className="text-[7px] md:text-[9px] font-bold bg-black/10 px-1 rounded scale-90 md:scale-100 truncate w-full text-center">
                                {ingInfo.name}
                              </span>
                            </div>

                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>

              </div>

            </div>

            {/* RULE MANUAL MODAL */}
            {showRules && (
              <div className="fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-3">
                <div className="bg-white rounded-2xl max-w-md w-full p-4 border-2 border-amber-400 shadow-xl relative max-h-[90vh] overflow-y-auto">
                  <button 
                    onClick={() => { sfx.playSelect(); setShowRules(false); }}
                    className="absolute top-2 right-2 text-slate-400 text-lg"
                  >
                    <i className="fa-solid fa-circle-xmark"></i>
                  </button>

                  <h3 className="text-lg font-jua text-amber-500 mb-2 border-b-2 pb-1 flex items-center gap-1">
                    🍔 스택버거 게임 방법안내
                  </h3>

                  <div className="space-y-2 text-slate-700 text-[11px] leading-relaxed">
                    <p><strong>1. 게임의 목표</strong>: 수집한 재료의 위치를 기억하여 대기 중인 버거 레시피를 맨 밑에서부터 순서대로 맞추고, 승리 점수(모자 갯수)에 먼저 도달하세요.</p>
                    <p><strong>2. 턴의 진행</strong>: 자신의 차례에는 아래 두 가지 행동 중 <span className="text-amber-800">한 가지만</span> 가능합니다.</p>
                    <ul className="list-disc pl-4 space-y-1">
                      <li><strong>탐색</strong>: 아무 타일이나 2개 골라 뒤집어 확인합니다. 모두 기억한 뒤 '탐색 마치기'를 눌러 다음 차례로 턴을 넘깁니다.</li>
                      <li><strong>도전</strong>: 레시피 아래 '도전하기'를 누른 뒤, 맨 하단 재료부터 쌓습니다. 한 개라도 틀리면 도전은 즉시 실패하며 턴이 종료됩니다.</li>
                    </ul>
                    <p><strong>3. 레시피 점수</strong>: 성공 시 모자 점수를 획득하며 레시피 카드가 새 카드로 갱신됩니다.</p>
                  </div>
                </div>
              </div>
            )}

          </div>
        );
      }

      if (gamePhase === 'gameover') {
        const sortedPlayers = [...players].sort((a, b) => b.score - a.score);
        const winner = sortedPlayers[0];

        return (
          <div className="max-w-md mx-auto px-2 py-4 text-center">
            <div className="bg-white rounded-2xl p-4 shadow-xl border-2 border-amber-500">
              <div className="text-4xl mb-2">👑🏆🍔</div>
              <h1 className="text-2xl font-jua text-amber-500 mb-1">버거 마스터 탄생!</h1>
              
              <div className="bg-amber-50 rounded-xl p-4 border border-amber-200 mb-4">
                <div className="text-4xl mb-1">{winner.icon}</div>
                <h2 className="text-lg font-jua text-amber-900">{winner.name}</h2>
                <div className="text-xl font-jua text-amber-600">
                  🧑‍🍳 총 모자 {winner.score}개 획득
                </div>
              </div>

              {/* Leaderboard */}
              <div className="space-y-1 mb-4 text-xs">
                {sortedPlayers.map((p, idx) => (
                  <div key={p.id} className="flex items-center justify-between bg-slate-50 px-3 py-1 rounded border border-slate-100">
                    <span className="font-bold text-slate-400">{idx + 1}위 {p.icon} {p.name}</span>
                    <span className="font-jua text-amber-600">🧑‍🍳 {p.score}개</span>
                  </div>
                ))}
              </div>

              <div className="flex gap-2">
                <button
                  onClick={startGame}
                  className="flex-1 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-jua text-sm py-2 rounded-xl shadow"
                >
                  🔄 한 판 더!
                </button>
                <button
                  onClick={resetToSetup}
                  className="flex-1 bg-slate-200 text-slate-700 font-jua text-sm py-2 rounded-xl"
                >
                  ⚙️ 설정 변경
                </button>
              </div>
            </div>
          </div>
        );
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
